name: Keep App Alive

on:
  schedule:
    # Pings every 6 hours — prevents Streamlit Cloud from sleeping
    - cron: "0 */6 * * *"
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping AniSound app
        run: |
          curl -sSf "https://anisound-quizz-fmqukewwrogafvywvj34jc.streamlit.app/" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -o /dev/null \
            && echo "✅ App is alive" \
            || echo "⚠️ Ping failed — app may be restarting"
